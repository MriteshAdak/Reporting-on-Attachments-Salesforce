<template>
  <lightning-card title="Query Builder" icon-name="standard:search">
    <div class="slds-var-p-around_medium">
      <lightning-combobox
        name="object"
        label="Select Object"
        value={selectedObject}
        options={objectOptions}
        data-control="object-selector"
        onchange={handleObjectChange}
        required
      >
      </lightning-combobox>

      <lightning-dual-listbox
        name="fields"
        label="Select Fields"
        source-label="Available Fields"
        selected-label="Selected Fields"
        options={fieldOptions}
        value={selectedFields}
        data-control="field-selector"
        onchange={handleFieldChange}
        required
        class="slds-var-m-top_small"
        disabled={isLoading}
      >
      </lightning-dual-listbox>

      <div class="slds-var-m-top_medium">
        <template if:true={formErrorMessage}>
          <div
            class="slds-text-color_error slds-var-m-bottom_small"
            role="alert"
          >
            {formErrorMessage}
          </div>
        </template>

        <div class="slds-grid">
          <div class="slds-var-m-top_small slds-text-color_weak">
            <p>Filter by field values</p>
          </div>
          <div class="slds-col_bump-left">
            <lightning-button
              label="Add Condition"
              icon-name="utility:add"
              onclick={handleAddFilter}
              disabled={isLoading}
            >
            </lightning-button>
          </div>
        </div>

        <template if:true={filters.length}>
          <div class="slds-var-m-top_small">
            <template for:each={filters} for:item="filter">
              <div
                key={filter.id}
                class="slds-grid slds-gutters slds-var-m-bottom_small slds-grid_vertical-align-end"
              >
                <div class="slds-col slds-size_3-of-12">
                  <lightning-combobox
                    label="Field"
                    value={filter.fieldName}
                    options={fieldOptions}
                    data-id={filter.id}
                    data-name="fieldName"
                    data-control="filter-field"
                    onchange={handleFilterChange}
                    required
                  >
                  </lightning-combobox>
                </div>

                <div class="slds-col slds-size_3-of-12">
                  <lightning-combobox
                    label="Operator"
                    value={filter.operator}
                    options={operatorOptions}
                    data-id={filter.id}
                    data-name="operator"
                    data-control="filter-operator"
                    onchange={handleFilterChange}
                    required
                  >
                  </lightning-combobox>
                </div>

                <div class="slds-col slds-size_5-of-12">
                  <!-- Single Value Input (default) -->
                  <template if:false={filter.requiresMultiValue}>
                    <lightning-input
                      label="Value"
                      value={filter.value}
                      data-id={filter.id}
                      data-name="value"
                      data-control="filter-value"
                      onchange={handleFilterChange}
                      placeholder="Enter value"
                      required
                    >
                    </lightning-input>
                  </template>

                  <!-- Multi-Value Input (for IN, NOT IN, INCLUDES, EXCLUDES) -->
                  <template if:true={filter.requiresMultiValue}>
                    <div
                      class={filter.multiValueFormElementClass}
                      data-control="pill-wrapper"
                      data-id={filter.id}
                    >
                      <label class="slds-form-element__label">Values</label>
                      <div class="slds-form-element__control">
                        <template if:true={filter.valueItems.length}>
                          <lightning-pill-container
                            items={filter.valueItems}
                            data-id={filter.id}
                            onitemremove={handlePillRemove}
                          >
                          </lightning-pill-container>
                        </template>
                        <lightning-input
                          label="Add value"
                          variant="label-hidden"
                          placeholder="Type value and press Enter"
                          value={filter.currentInputValue}
                          data-id={filter.id}
                          data-name="currentInputValue"
                          data-control="filter-multivalue-input"
                          aria-invalid={filter.pillContainerHasError}
                          aria-describedby={filter.pillErrorHelpId}
                          onchange={handleMultiValueInput}
                          onkeyup={handleMultiValueKeyup}
                          class="slds-var-m-top_x-small"
                        >
                        </lightning-input>

                        <template if:true={filter.pillContainerHasError}>
                          <div
                            id={filter.pillErrorHelpId}
                            class="slds-form-element__help"
                          >
                            {filter.pillContainerErrorMessage}
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>

                <div class="slds-col slds-size_1-of-12">
                  <lightning-button-icon
                    icon-name="utility:delete"
                    variant="border-filled"
                    alternative-text="Remove condition"
                    data-id={filter.id}
                    onclick={handleRemoveFilter}
                  >
                  </lightning-button-icon>
                </div>
              </div>
            </template>
          </div>
        </template>

        <template if:false={filters.length}>
          <div class="slds-var-m-top_small slds-text-color_weak">
            <p>No conditions added. Click "Add Condition" to filter results.</p>
          </div>
        </template>
      </div>

      <lightning-input
        type="number"
        name="limit"
        label="Limit"
        value={limitValue}
        onchange={handleLimitChange}
        min="1"
        max="2000"
        class="slds-var-m-top_small"
      >
      </lightning-input>

      <div class="slds-var-m-top_medium">
        <lightning-button
          id="execute-query-button"
          variant="brand"
          label="Execute Query"
          onclick={handleRunQuery}
          disabled={isLoading}
        >
        </lightning-button>
      </div>
      <template if:true={isLoading}>
        <div class="slds-var-m-top_small">
          <lightning-spinner
            alternative-text="Loading"
            size="small"
          ></lightning-spinner>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
