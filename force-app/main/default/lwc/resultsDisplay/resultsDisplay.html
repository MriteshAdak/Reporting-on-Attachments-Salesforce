<template>
  <lightning-card title="Query Results" icon-name="standard:data_streams">
    <div class="slds-var-p-around_medium">
      <template if:true={isLoading}>
        <div class="slds-var-m-bottom_small">
          <lightning-spinner
            alternative-text="Loading query results"
            size="small"
          >
          </lightning-spinner>
        </div>
      </template>

      <template if:true={hasError}>
        <div
          class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-var-m-bottom_small"
          role="alert"
        >
          <span class="slds-assistive-text">Error</span>
          <h2>{errorMessage}</h2>
        </div>
      </template>

      <template if:true={hasResults}>
        <div
          class="slds-var-m-bottom_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
        >
          <p class="slds-text-heading_small">
            <lightning-formatted-number
              value={recordCount}
            ></lightning-formatted-number>
            record(s) found
          </p>
          <p class="slds-text-body_small slds-text-color_weak">{pageStatus}</p>
        </div>
        <lightning-datatable
          key-field="__rowKey"
          data={visibleRows}
          columns={columns}
          hide-checkbox-column
          show-row-number-column
        >
        </lightning-datatable>

        <template if:true={showPagination}>
          <div
            class="slds-var-m-top_medium slds-grid slds-wrap slds-gutters_x-small slds-grid_vertical-align-center"
          >
            <div class="slds-col">
              <lightning-button
                label="Previous"
                onclick={handlePreviousPage}
                disabled={disablePrevious}
              >
              </lightning-button>
            </div>

            <template for:each={pageItems} for:item="item">
              <div key={item.key} class="slds-col">
                <lightning-button
                  label={item.label}
                  variant={item.variant}
                  data-page={item.page}
                  onclick={handlePageSelect}
                >
                </lightning-button>
              </div>
            </template>

            <div class="slds-col">
              <lightning-button
                label="Next"
                onclick={handleNextPage}
                disabled={disableNext}
              >
              </lightning-button>
            </div>
          </div>
        </template>
      </template>

      <template if:true={noResults}>
        <div class="slds-text-align_center slds-var-p-around_large">
          <lightning-icon
            icon-name="utility:search"
            size="large"
            alternative-text="No results"
          >
          </lightning-icon>
          <p class="slds-var-m-top_small slds-text-color_weak">
            No results to display. Execute a query to see results here.
          </p>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
